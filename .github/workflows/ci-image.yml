name: Build and publish GHCR image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to build
        required: false
        default: main

jobs:
  build-and-smoke:
    name: Build and smoke-test image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      full_sha: ${{ steps.meta.outputs.full_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      created: ${{ steps.meta.outputs.created }}
      publish: ${{ steps.meta.outputs.publish }}
      deploy_tag: ${{ steps.meta.outputs.deploy_tag }}
      publish_tags: ${{ steps.meta.outputs.publish_tags }}
    steps:
      - name: Checkout triggering commit
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Compute image metadata and tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          repository="ghcr.io/futuroptimist/jobbot3000"
          full_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          publish="false"
          deploy_tag=""
          publish_tags="${repository}:sha-${short_sha}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            publish="true"
            deploy_tag="main-${short_sha}"
            publish_tags="${repository}:main-${short_sha}"$'\n'"${repository}:main-latest"$'\n'"${repository}:sha-${short_sha}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            publish="true"
            deploy_tag="${GITHUB_REF#refs/tags/}"
            publish_tags="${repository}:${deploy_tag}"$'\n'"${repository}:sha-${short_sha}"
          fi

          {
            echo "full_sha=${full_sha}"
            echo "short_sha=${short_sha}"
            echo "created=${created}"
            echo "publish=${publish}"
            echo "deploy_tag=${deploy_tag}"
            echo "publish_tags<<EOF"
            echo "${publish_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          tags: jobbot3000:smoke
          cache-from: type=gha,scope=jobbot3000-image
          cache-to: type=gha,mode=max,scope=jobbot3000-image
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.full_sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.licenses=MIT

      - name: Smoke test local image
        shell: bash
        run: |
          set -euo pipefail

          container_name="jobbot3000-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker logs "${container_name}" || true
            docker rm -f "${container_name}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d --name "${container_name}" \
            -p 127.0.0.1:8080:8080 \
            jobbot3000:smoke

          ready=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null \
              && curl -fsS http://127.0.0.1:8080/healthz >/dev/null \
              && curl -fsS http://127.0.0.1:8080/livez >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          test "${ready}" = 1

          curl -fsS http://127.0.0.1:8080/ | grep -F "jobbot3000 static production mode"
          curl -fsS http://127.0.0.1:8080/healthz | grep -F '"status":"ok"'
          curl -fsS http://127.0.0.1:8080/livez | grep -F '"status":"ok"'

      - name: Summarize image build contract
        shell: bash
        run: |
          set -euo pipefail

          image_tag="main-${{ steps.meta.outputs.short_sha }}"
          image_ref="ghcr.io/futuroptimist/jobbot3000:${image_tag}"

          {
            echo "## jobbot3000 image"
            echo ""
            echo "Image tag candidate: \`${image_ref}\`"
            echo "Sugarkube deploy tag candidate: \`${image_tag}\`"
            echo ""
            if [ "${{ steps.meta.outputs.publish }}" = "true" ]; then
              echo "Publishing tags:"
              sed 's/^/- `/' <<< "${{ steps.meta.outputs.publish_tags }}" | sed 's/$/`/'
              echo ""
              echo "Copy-paste Sugarkube deploy tag: \`${{ steps.meta.outputs.deploy_tag }}\`"
            else
              echo "Publish behavior: validate-only for \`${{ github.event_name }}\`; no GHCR tags are published."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish multi-arch image
    runs-on: ubuntu-latest
    needs: build-and-smoke
    if: needs.build-and-smoke.outputs.publish == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4

      - name: Verify publish checkout matches smoke-tested commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ needs.build-and-smoke.outputs.full_sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ needs.build-and-smoke.outputs.publish_tags }}
          cache-from: type=gha,scope=jobbot3000-image
          cache-to: type=gha,mode=max,scope=jobbot3000-image
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.build-and-smoke.outputs.full_sha }}
            org.opencontainers.image.created=${{ needs.build-and-smoke.outputs.created }}
            org.opencontainers.image.licenses=MIT

      - name: Summarize published immutable tag
        shell: bash
        run: |
          image_tag="${{ needs.build-and-smoke.outputs.deploy_tag }}"
          image_ref="ghcr.io/futuroptimist/jobbot3000:${image_tag}"

          {
            echo "Published immutable image tag: \`${image_ref}\`"
            echo "Sugarkube deploy tag: \`${image_tag}\`"
          } >> "$GITHUB_STEP_SUMMARY"
