name: Build and publish GHCR image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main

jobs:
  build-and-smoke:
    name: Build and smoke-test static image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      full_sha: ${{ steps.tags.outputs.full_sha }}
      short_sha: ${{ steps.tags.outputs.short_sha }}
      created: ${{ steps.tags.outputs.created }}
      repository: ${{ steps.tags.outputs.repository }}
      publish_tags: ${{ steps.tags.outputs.publish_tags }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      ref_kind: ${{ steps.tags.outputs.ref_kind }}
      semver_tag: ${{ steps.tags.outputs.semver_tag }}
      deploy_tag: ${{ steps.tags.outputs.deploy_tag }}
      publish: ${{ steps.tags.outputs.publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Compute image metadata and tags
        id: tags
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          ref="${GITHUB_REF}"
          full_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          repository="ghcr.io/futuroptimist/jobbot3000"
          sha_tag="${repository}:sha-${short_sha}"
          publish_tags="${sha_tag}"
          ref_kind="other"
          semver_tag=""
          publish="false"
          deploy_tag=""

          if [[ "${event_name}" == "push" && "${ref}" == "refs/heads/main" ]]; then
            ref_kind="main"
            publish="true"
            deploy_tag="main-${short_sha}"
            publish_tags="${repository}:main-${short_sha}"$'\n'"${repository}:main-latest"$'\n'"${sha_tag}"
          elif [[ "${event_name}" == "push" && "${ref}" == refs/tags/v* ]]; then
            ref_kind="tag"
            semver_tag="${ref#refs/tags/}"
            if [[ ! "${semver_tag}" =~ ^v(0|[1-9][0-9]*)[.](0|[1-9][0-9]*)[.](0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)([.](0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?$ ]]; then
              echo "Malformed semver tag ref (expected vX.Y.Z with optional prerelease): ${ref}" >&2
              exit 1
            fi
            publish="true"
            deploy_tag="${semver_tag}"
            publish_tags="${repository}:${semver_tag}"$'\n'"${sha_tag}"
          fi

          echo "full_sha=${full_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "created=${created}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "ref_kind=${ref_kind}" >> "$GITHUB_OUTPUT"
          echo "semver_tag=${semver_tag}" >> "$GITHUB_OUTPUT"
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "deploy_tag=${deploy_tag}" >> "$GITHUB_OUTPUT"
          echo "publish_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${publish_tags}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static image locally for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          tags: jobbot3000:smoke
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.full_sha }}
            org.opencontainers.image.created=${{ steps.tags.outputs.created }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=jobbot3000-image
          cache-to: type=gha,mode=max,scope=jobbot3000-image

      - name: Smoke test static container
        run: npm run smoke:container -- jobbot3000:smoke

      - name: Publish validation summary
        run: |
          {
            echo "## jobbot3000 image validation"
            echo ""
            echo "Repository: \`${{ steps.tags.outputs.repository }}\`"
            echo "Commit: \`${{ steps.tags.outputs.full_sha }}\`"
            if [[ "${{ steps.tags.outputs.publish }}" == "true" ]]; then
              echo "Publishing will be handled by the publish job."
              echo "Immutable Sugarkube deploy tag after publish: \`${{ steps.tags.outputs.deploy_tag }}\`"
            else
              echo "Pushed: false"
              echo "This pull_request/workflow_dispatch run is validate-only; publish by pushing to \`main\` or a semver tag \`vX.Y.Z\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish static image
    runs-on: ubuntu-latest
    needs: build-and-smoke
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for arm64 publish
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch static image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ needs.build-and-smoke.outputs.publish_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.build-and-smoke.outputs.full_sha }}
            org.opencontainers.image.created=${{ needs.build-and-smoke.outputs.created }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=jobbot3000-image
          cache-to: type=gha,mode=max,scope=jobbot3000-image

      - name: Publish workflow summary
        run: |
          {
            echo "## jobbot3000 image tags"
            echo ""
            if [[ "${{ needs.build-and-smoke.outputs.ref_kind }}" == "main" ]]; then
              echo "Immutable image ref: \`ghcr.io/futuroptimist/jobbot3000:main-${{ needs.build-and-smoke.outputs.short_sha }}\`"
              echo "Sugarkube deploy tag: \`main-${{ needs.build-and-smoke.outputs.short_sha }}\`"
              echo "Mutable convenience tag: \`ghcr.io/futuroptimist/jobbot3000:main-latest\`"
            elif [[ "${{ needs.build-and-smoke.outputs.ref_kind }}" == "tag" ]]; then
              echo "Release image ref: \`ghcr.io/futuroptimist/jobbot3000:${{ needs.build-and-smoke.outputs.semver_tag }}\`"
              echo "Sugarkube deploy tag: \`${{ needs.build-and-smoke.outputs.semver_tag }}\`"
            fi
            echo "SHA image ref: \`${{ needs.build-and-smoke.outputs.sha_tag }}\`"
            echo ""
            echo "Pushed: true"
          } >> "$GITHUB_STEP_SUMMARY"
