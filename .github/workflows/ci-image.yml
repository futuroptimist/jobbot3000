name: Container image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/futuroptimist/jobbot3000

jobs:
  smoke:
    name: Build and smoke test image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      full_sha: ${{ steps.meta.outputs.full_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      created: ${{ steps.meta.outputs.created }}
      publish: ${{ steps.meta.outputs.publish }}
      immutable_tag: ${{ steps.meta.outputs.immutable_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          FULL_SHA="${GITHUB_SHA}"
          SHORT_SHA="${FULL_SHA::12}"
          CREATED="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          PUBLISH=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            PUBLISH=true
          fi
          {
            echo "full_sha=${FULL_SHA}"
            echo "short_sha=${SHORT_SHA}"
            echo "created=${CREATED}"
            echo "publish=${PUBLISH}"
            echo "immutable_tag=main-${SHORT_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build local smoke image
        run: |
          docker build \
            --label org.opencontainers.image.source="https://github.com/${{ github.repository }}" \
            --label org.opencontainers.image.revision="${{ steps.meta.outputs.full_sha }}" \
            --label org.opencontainers.image.created="${{ steps.meta.outputs.created }}" \
            --label org.opencontainers.image.licenses="MIT" \
            -t jobbot3000:smoke .

      - name: Smoke test /, /healthz, and /livez
        shell: bash
        run: |
          set -euo pipefail
          CID="$(docker run -d -p 127.0.0.1:8080:8080 jobbot3000:smoke)"
          cleanup() { docker rm -f "${CID}" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          for path in / /healthz /livez; do
            for attempt in {1..30}; do
              if curl -fsS "http://127.0.0.1:8080${path}" >/dev/null; then
                echo "ok ${path}"
                break
              fi
              if [[ "${attempt}" == 30 ]]; then
                docker logs "${CID}" || true
                exit 1
              fi
              sleep 1
            done
          done

      - name: Summarize image smoke result
        shell: bash
        run: |
          {
            echo "## jobbot3000 image smoke"
            echo
            echo "- Commit: \`${{ steps.meta.outputs.full_sha }}\`"
            echo "- Smoke image: \`jobbot3000:smoke\`"
            echo "- Publish on this run: \`${{ steps.meta.outputs.publish }}\`"
            echo "- Immutable deploy tag: \`${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.immutable_tag }}\`"
            echo
            echo "Sugarkube deploy tag: \`${{ steps.meta.outputs.immutable_tag }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish:
    name: Publish multi-arch image to GHCR
    needs: smoke
    if: needs.smoke.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish linux/amd64 and linux/arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main-${{ needs.smoke.outputs.short_sha }}
            ${{ env.IMAGE_NAME }}:main-latest
            ${{ env.IMAGE_NAME }}:sha-${{ needs.smoke.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.smoke.outputs.full_sha }}
            org.opencontainers.image.created=${{ needs.smoke.outputs.created }}
            org.opencontainers.image.licenses=MIT

      - name: Summarize published image
        shell: bash
        run: |
          {
            echo "## Published jobbot3000 image"
            echo
            echo "- Immutable image: \`${{ env.IMAGE_NAME }}:main-${{ needs.smoke.outputs.short_sha }}\`"
            echo "- SHA alias: \`${{ env.IMAGE_NAME }}:sha-${{ needs.smoke.outputs.short_sha }}\`"
            echo "- Convenience tag: \`${{ env.IMAGE_NAME }}:main-latest\`"
            echo "- Platforms: \`linux/amd64,linux/arm64\`"
            echo
            echo "### Sugarkube"
            echo
            echo "Deploy this immutable tag to staging or production after promotion:"
            echo
            echo "\`main-${{ needs.smoke.outputs.short_sha }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
