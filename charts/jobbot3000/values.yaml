replicaCount: 1

image:
  repository: ghcr.io/futuroptimist/jobbot3000
  tag: main-latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

podLabels: {}
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

containerPort: 8080

ingress:
  enabled: false
  host: jobbot3000.example.invalid
  className: ""
  annotations: {}
  tls: []

resources: {}

probes:
  liveness:
    path: /livez
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
