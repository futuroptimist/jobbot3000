replicaCount: 1

image:
  repository: ghcr.io/futuroptimist/jobbot3000
  tag: main-latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

podLabels: {}
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

containerPort: 8080

ingress:
  enabled: false
  host: jobbot3000.example.test
  className: ""
  annotations: {}
  tls: []

# Conservative Pi-friendly defaults make Kubernetes saturation and restart
# analysis possible without over-reserving small Sugarkube nodes.
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    path: /livez
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 3
