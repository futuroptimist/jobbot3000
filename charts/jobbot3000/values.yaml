replicaCount: 1

image:
  repository: ghcr.io/futuroptimist/jobbot3000
  tag: main-latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

podLabels: {}
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

containerPort: 8080

probes:
  liveness:
    path: /livez
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

resources: {}

ingress:
  enabled: false
  host: ""
  className: ""
  annotations: {}
  tls: []
