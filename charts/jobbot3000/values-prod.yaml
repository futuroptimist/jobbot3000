image:
  tag: main-REPLACE_WITH_RELEASE_SHA
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  host: jobbot3000.example.invalid
  className: nginx
  tls:
    - secretName: jobbot3000-tls-placeholder
      hosts:
        - jobbot3000.example.invalid

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
