version: "3.9"
services:
  web:
    image: jobbot3000-web:latest
    build:
      context: .
      target: runtime
    environment:
      - JOBBOT_WEB_ENV=production
      - JOBBOT_WEB_HOST=0.0.0.0
      - JOBBOT_WEB_PORT=8080
      - JOBBOT_WEB_HEALTH_URL=http://127.0.0.1:8080/healthz
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
      - seccomp=./config/seccomp/jobbot-web.json
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch(process.env.JOBBOT_WEB_HEALTH_URL || 'http://127.0.0.1:8080/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
